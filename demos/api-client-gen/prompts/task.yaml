goal: >
  Create a TypeScript API client module for the JSONPlaceholder API
  (https://jsonplaceholder.typicode.com).
  All file paths are relative to the projectRoot directory specified in context.
  All file operations (read, write, search, shell commands) must use absolute paths
  resolved from projectRoot.

context:
  projectRoot: ./my-project
  language: TypeScript
  runtime: Node.js
  httpClient: axios
  testFramework: vitest
  existingStructure: |
    my-project/
    ├── package.json
    ├── tsconfig.json
    ├── vitest.config.ts
    └── src/
        └── utils/
            └── http.ts          # HttpClient class wrapping axios.create()
  targetStructure: |
    my-project/
    ├── package.json
    ├── tsconfig.json
    ├── vitest.config.ts
    └── src/
        ├── utils/
        │   └── http.ts
        └── api/                 # NEW — all files below must be created
            ├── types.ts
            ├── jsonplaceholder.ts
            └── __tests__/
                └── jsonplaceholder.test.ts
  notes:
    - Follow existing code style in src/utils/http.ts for the HTTP utility pattern
    - All paths in expectedOutput are relative to projectRoot
    - Do NOT read or search for test files — there are none yet

expectedOutput:
  - path: src/api/jsonplaceholder.ts
    description: A typed API client class with methods for posts, users, and comments
    criteria:
      - Uses axios.create() with baseURL following existing project patterns
      - Methods are fully typed with return types
      - Exports a default client instance
  - path: src/api/types.ts
    description: TypeScript type definitions for API response shapes
    criteria:
      - Post, User, and Comment interfaces
      - All fields typed based on actual API response shapes
  - path: src/api/__tests__/jsonplaceholder.test.ts
    description: Test file using vitest
    criteria:
      - Tests for each client method
      - All tests passing when run with npx vitest run
