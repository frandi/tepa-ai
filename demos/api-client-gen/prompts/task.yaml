goal: >
  Create a TypeScript API client module for the JSONPlaceholder API
  (https://jsonplaceholder.typicode.com).
  All file paths are relative to the projectRoot directory specified in context.
  All file operations (read, write, search, shell commands) must use absolute paths
  resolved from projectRoot.

context:
  projectRoot: ./my-project
  language: TypeScript
  runtime: Node.js
  httpClient: axios
  testFramework: vitest
  existingStructure: |
    my-project/
    ├── package.json
    ├── tsconfig.json
    ├── vitest.config.ts
    └── src/
        └── utils/
            └── http.ts          # HttpClient class wrapping axios.create()
  targetStructure: |
    my-project/
    ├── package.json
    ├── tsconfig.json
    ├── vitest.config.ts
    └── src/
        ├── utils/
        │   └── http.ts
        └── api/                 # NEW — all files below must be created
            ├── types.ts
            ├── jsonplaceholder.ts
            └── __tests__/
                └── jsonplaceholder.test.ts
  notes:
    - Follow existing code style in src/utils/http.ts for the HTTP utility pattern
    - All paths in expectedOutput are relative to projectRoot
    - On the first cycle there are no test files yet; on later cycles you MAY read files written in earlier cycles

expectedOutput:
  - path: src/api/jsonplaceholder.ts
    description: A typed API client class with methods for posts, users, and comments
    criteria:
      - "Uses the existing HttpClient from ../utils/http (which wraps axios.create()) with baseURL 'https://jsonplaceholder.typicode.com' — do NOT call axios.create() directly here"
      - "Exports a class JsonPlaceholderClient with these six fully-typed async methods — getPosts(): Promise<Post[]>, getPost(id: number): Promise<Post>, getUsers(): Promise<User[]>, getUser(id: number): Promise<User>, getComments(): Promise<Comment[]>, getCommentsByPost(postId: number): Promise<Comment[]>"
      - "Exports a default instance of JsonPlaceholderClient (the test file consumes this default instance — the client module and the test file must agree on this exact API surface)"
  - path: src/api/types.ts
    description: TypeScript type definitions for API response shapes
    criteria:
      - Post, User, and Comment interfaces
      - All fields typed based on actual API response shapes
  - path: src/api/__tests__/jsonplaceholder.test.ts
    description: Test file using vitest
    criteria:
      - "Imports the default JsonPlaceholderClient instance from '../jsonplaceholder' and calls methods on it (e.g. client.getPost(1)) — do NOT import named functions from that module"
      - "One test per client method (six in total) — makes a real HTTP call to JSONPlaceholder and asserts shape and ids"
      - "Uses a per-test or file-level timeout of at least 15000ms to tolerate network latency"
      - "All tests passing when run with npx vitest run"
